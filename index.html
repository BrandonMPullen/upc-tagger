<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tag Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Tag Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --surface2: #252525;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --accent: #e8f54e;
      --accent-dim: rgba(232,245,78,0.12);
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --danger: #ff5f5f;
      --danger-dim: rgba(255,95,95,0.12);
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    header {
      padding: 1.25rem 1rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    #item-badge {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      display: none;
    }

    .input-zone {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #scanner-area {
      display: none;
      margin-bottom: 0.75rem;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: #000;
    }

    #preview {
      width: 100%;
      display: block;
      max-height: 200px;
      object-fit: cover;
    }

    #scanner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-box {
      width: 70%;
      height: 80px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
    }

    #stop-scan {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--sans);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .row:last-child { margin-bottom: 0; }

    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="number"] { width: 72px; flex-shrink: 0; text-align: center; }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { background: var(--surface2); }

    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #111;
      flex: 1;
    }

    .btn-accent:active { background: #d4e030; }

    .btn-scan { flex-shrink: 0; }

    #error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      display: none;
      font-family: var(--mono);
    }

    #flash-msg {
      font-size: 12px;
      color: var(--accent);
      margin-top: 6px;
      display: none;
      font-family: var(--mono);
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .list-header span {
      font-size: 12px;
      color: var(--text2);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .list-actions { display: flex; gap: 8px; }

    .btn-sm {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s, border-color 0.12s;
    }

    .btn-sm:active { background: var(--surface2); }
    .btn-sm.danger { color: var(--danger); border-color: rgba(255,95,95,0.3); }

    #list-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 1rem;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .item-upc {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .item-qty-label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
      font-family: var(--mono);
    }

    .item-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      line-height: 1;
      font-family: var(--sans);
    }

    .ctrl-btn:active { background: var(--surface2); }

    .ctrl-qty {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      min-width: 22px;
      text-align: center;
    }

    .del-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--danger-dim);
      border: 1px solid rgba(255,95,95,0.25);
      color: var(--danger);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      font-family: var(--sans);
    }

    .del-btn:active { background: rgba(255,95,95,0.25); }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      color: var(--text3);
      font-size: 14px;
      text-align: center;
      gap: 8px;
    }

    #empty-state svg { opacity: 0.3; }

    #list-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<header>
  <h1>tag tracker</h1>
  <span id="item-badge">0 items</span>
</header>

<div class="input-zone">
  <div id="scanner-area">
    <video id="preview" playsinline autoplay muted></video>
    <div id="scanner-overlay"><div class="scan-box"></div></div>
    <button id="stop-scan">✕ stop</button>
  </div>

  <div class="row">
    <input type="text" id="upc-input" inputmode="numeric" placeholder="UPC barcode" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="btn btn-scan" id="scan-btn">Scan</button>
    <button class="btn btn-accent" id="add-btn">Add</button>
  </div>

  <div id="error-msg"></div>
  <div id="flash-msg"></div>
</div>

<div id="list-section" style="display:none;">
  <div class="list-header">
    <span id="list-label">items</span>
    <div class="list-actions">
      <button class="btn-sm" id="email-btn">Email list</button>
      <button class="btn-sm danger" id="clear-btn">Clear</button>
    </div>
  </div>
  <div id="list-container">
    <div id="upc-list"></div>
  </div>
</div>

<div id="empty-state">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="8" width="3" height="24" fill="currentColor"/>
    <rect x="9" y="8" width="1.5" height="24" fill="currentColor"/>
    <rect x="12" y="8" width="3" height="24" fill="currentColor"/>
    <rect x="17" y="8" width="1.5" height="24" fill="currentColor"/>
    <rect x="20" y="8" width="4" height="24" fill="currentColor"/>
    <rect x="26" y="8" width="1.5" height="24" fill="currentColor"/>
    <rect x="29" y="8" width="3" height="24" fill="currentColor"/>
    <rect x="34" y="8" width="2" height="24" fill="currentColor"/>
  </svg>
  <span>No items yet.<br/>Scan or type a UPC to start.</span>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  let items = [];
  let scanning = false;
  let stream = null;
  let animFrame = null;
  let detector = null;

  const upcInput = document.getElementById('upc-input');
  const addBtn = document.getElementById('add-btn');
  const scanBtn = document.getElementById('scan-btn');
  const stopScanBtn = document.getElementById('stop-scan');
  const scannerArea = document.getElementById('scanner-area');
  const listSection = document.getElementById('list-section');
  const emptyState = document.getElementById('empty-state');
  const upcList = document.getElementById('upc-list');
  const listLabel = document.getElementById('list-label');
  const itemBadge = document.getElementById('item-badge');
  const errorMsg = document.getElementById('error-msg');
  const flashMsg = document.getElementById('flash-msg');
  const emailBtn = document.getElementById('email-btn');
  const clearBtn = document.getElementById('clear-btn');
  const preview = document.getElementById('preview');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    flashMsg.style.display = 'none';
    clearTimeout(showError._t);
    showError._t = setTimeout(() => { errorMsg.style.display = 'none'; }, 3500);
  }

  function showFlash(msg) {
    flashMsg.textContent = msg;
    flashMsg.style.display = 'block';
    errorMsg.style.display = 'none';
    clearTimeout(showFlash._t);
    showFlash._t = setTimeout(() => { flashMsg.style.display = 'none'; }, 1800);
  }

  function renderList() {
    const count = items.length;
    if (count === 0) {
      listSection.style.display = 'none';
      emptyState.style.display = 'flex';
      itemBadge.style.display = 'none';
      return;
    }
    listSection.style.display = 'flex';
    emptyState.style.display = 'none';
    itemBadge.style.display = 'inline';
    itemBadge.textContent = count + ' item' + (count !== 1 ? 's' : '');
    listLabel.textContent = count + ' item' + (count !== 1 ? 's' : '');
    upcList.innerHTML = '';
    items.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'list-item';
      row.innerHTML = `
        <div>
          <div class="item-upc">${item.upc}</div>
          <div class="item-qty-label">${item.qty} tag${item.qty !== 1 ? 's' : ''}</div>
        </div>
        <div class="item-controls">
          <button class="ctrl-btn" data-i="${i}" data-action="dec">−</button>
          <span class="ctrl-qty">${item.qty}</span>
          <button class="ctrl-btn" data-i="${i}" data-action="inc">+</button>
          <button class="del-btn" data-i="${i}" data-action="del">✕</button>
        </div>
      `;
      upcList.appendChild(row);
    });
    upcList.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = +btn.dataset.i;
        const action = btn.dataset.action;
        if (action === 'dec') { if (items[i].qty > 1) items[i].qty--; }
        else if (action === 'inc') { items[i].qty++; }
        else if (action === 'del') { items.splice(i, 1); }
        renderList();
      });
    });
  }

  function formatUPC(raw) {
    let digits = raw.replace(/\D/g, '');
    digits = digits.replace(/^0+/, '');
    digits = digits.slice(0, -1);
    if (digits.length === 11) return digits[0] + '-' + digits.slice(1, 6) + '-' + digits.slice(6);
    if (digits.length === 10) return digits.slice(0, 5) + '-' + digits.slice(5);
    return digits;
  }

  function addItem(upc, autoAdded) {
    upc = (upc || '').trim().replace(/\D/g, '');
    if (!upc) { showError('Enter a UPC.'); return false; }
    const formatted = formatUPC(upc);
    const existing = items.find(x => x.raw === upc);
    if (existing) {
      existing.qty += 1;
      showFlash('Duplicate — qty bumped to ' + existing.qty + '.');
    } else {
      items.push({ raw: upc, upc: formatted, qty: 1 });
      showFlash(autoAdded ? ('Added ' + formatted) : ('Added — ' + items.length + ' item' + (items.length !== 1 ? 's' : '') + ' total.'));
    }
    upcInput.value = '';
    upcInput.focus();
    renderList();
    return true;
  }

  addBtn.addEventListener('click', () => addItem(upcInput.value, false));
  upcInput.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(upcInput.value, false); });

  let lastScanned = '';
  let scanCooldown = false;

  async function scanLoop() {
    if (!scanning || !detector) return;
    if (preview.readyState < 2) { animFrame = requestAnimationFrame(scanLoop); return; }
    try {
      const barcodes = await detector.detect(preview);
      if (barcodes.length > 0 && !scanCooldown) {
        const code = barcodes[0].rawValue;
        if (code !== lastScanned || !scanCooldown) {
          lastScanned = code;
          scanCooldown = true;
          addItem(code, true);
          setTimeout(() => { scanCooldown = false; lastScanned = ''; }, 2000);
        }
      }
    } catch(e) {}
    animFrame = requestAnimationFrame(scanLoop);
  }

  scanBtn.addEventListener('click', async () => {
    if (scanning) return;

    if (!('BarcodeDetector' in window)) {
      showError('Barcode scanner not supported on this browser. Type UPC manually.');
      return;
    }

    try {
      const supported = await BarcodeDetector.getSupportedFormats();
      detector = new BarcodeDetector({ formats: ['upc_a', 'upc_e', 'ean_13', 'ean_8', 'code_128', 'code_39'].filter(f => supported.includes(f)) });
    } catch(e) {
      showError('Could not initialize scanner. Type UPC manually.');
      return;
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      preview.srcObject = stream;
      await preview.play();
      scanning = true;
      scannerArea.style.display = 'block';
      animFrame = requestAnimationFrame(scanLoop);
    } catch(e) {
      showError('Camera permission denied. Type UPC manually.');
      stopScanner();
    }
  });

  function stopScanner() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    preview.srcObject = null;
    scannerArea.style.display = 'none';
    scanning = false;
    scanCooldown = false;
    lastScanned = '';
  }

  stopScanBtn.addEventListener('click', stopScanner);

  emailBtn.addEventListener('click', () => {
    if (!items.length) return;
    const lines = items.map(x => x.upc + '  -  ' + x.qty + ' tag' + (x.qty !== 1 ? 's' : '')).join('\n');
    const total = items.reduce((s, x) => s + x.qty, 0);
    const body = encodeURIComponent('Tag list\n' + '='.repeat(30) + '\n\n' + lines + '\n\n' + '='.repeat(30) + '\nTotal tags: ' + total);
    window.location.href = 'mailto:?subject=' + encodeURIComponent('Tag list') + '&body=' + body;
  });

  clearBtn.addEventListener('click', () => {
    if (!items.length) return;
    if (confirm('Clear all ' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '?')) {
      items = [];
      renderList();
    }
  });

  renderList();
</script>
</body>
</html>
